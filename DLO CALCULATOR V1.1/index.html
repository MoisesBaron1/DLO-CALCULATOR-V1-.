<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DLO Calculator V1.1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>DLO Calculator V1.1</h1>
      <p class="muted">Vanilla JS · Inches · Fractions to 1/16"</p>
    </header>

    <section class="controls">
      <div class="row">
        <label>System:</label>
        <select id="system-select"></select>
      </div>

      <div class="row">
        <label>Mode:</label>
        <select id="mode-select">
          <option value="frames">Frames (Horizontal)</option>
          <option value="lites">Lites (Vertical)</option>
        </select>
      </div>

      <div class="row inputs">
        <div>
          <label for="input-width">Width (in)</label>
          <input id="input-width" type="number" step="0.0625" min="0" placeholder="0.00" />
        </div>
        <div>
          <label for="input-height">Height (in)</label>
          <input id="input-height" type="number" step="0.0625" min="0" placeholder="0.00" />
        </div>
        <div>
          <label for="input-qty">Qty</label>
          <input id="input-qty" type="number" min="1" step="1" value="1" />
        </div>
      </div>

      <div class="row">
        <button id="btn-calc" class="btn">Calculate DLO</button>
        <button id="btn-reset" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <section class="results">
      <h2>Results</h2>
      <div id="results">Awaiting input...</div>
    </section>

    <footer class="footer muted">Made with ♡ — DLO Calculator V1.1</footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
